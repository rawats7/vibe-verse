<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeVerse</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">
  <div class="header">
      <h1>𝑉𝒾𝒷𝑒𝒱𝓮𝓇𝓈𝑒 ♫</h1>
  </div>

  <div class="profile">
      <div class="profile-row">संगीतं नादस्य सौन्दर्यम्।</div>
      <div class="profile-row">Love • Beats • Soul</div>
      <div class="profile-row">Uttarakhand</div>
  </div>

  <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search song or artist...">
  </div>

  <!-- Colorful message when song not found -->
  <div id="notFoundMessage" style="display:none;" class="not-found-box">
      <h2>🎵 Oops! This song hasn’t entered VibeVerse yet.</h2>
      <p>Whisper its name to us — we’ll make it echo here soon.</p>
      <a href="https://www.instagram.com/raj_rawat.012" target="_blank" class="dm-btn">DM us on Instagram</a>
  </div>

  <div id="playlist"></div>
</div>

<div class="player">
    <div class="player-top">
        <img id="cover">
        <div class="player-info">
            <div id="title"></div>
            <div id="artist" style="opacity:0.7;"></div>
        </div>
    </div>

    <div class="controls">
        <button id="prevBtn">⏮</button>
        <button id="playPauseBtn">▶</button>
        <button id="nextBtn">⏭</button>
    </div>

    <div class="progress" onclick="seek(event)">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="time" id="time">0:00 / 0:00</div>
    <input type="range" min="0" max="1" step="0.01" class="volume" id="volume">
</div>

<audio id="audio" autoplay></audio>

<script src="app.js"></script>
</body>
</html>
